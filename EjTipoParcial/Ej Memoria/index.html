<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Titulo</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>

  <header>
    <h1 id="titulo">Juego de Memoria!</h1>
  </header>

  <main>

    <div id="inicioSesion">
      <form id="form">
        <span>Ingresar nombre de usuario <input id="usuario" type="text" required></span>
        <button type="submit">Ingresar</button>
      </form>
    </div>

    <section class="juego" id="juego" >
      <h3 id="mensajeUsuario"></h3>
      <div class="contenedorCartas" id="contenedorCartas"></div>
    </section>

    <h3 id="mensajeGanador"></h3>

  </main>

  <footer>
    <p>Juego de memoria Nicolas Bustamante</p>

    
</footer>

</body>
</html>
